packages:
  - "packages/**"
  - "apps/**"
  - "docs"
allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  sharp: true
  spawn-sync: true
minimumReleaseAgeExclude:
  - '@types/node@25.9.1'
  - '@types/react@19.2.15'
  - '@vitest/coverage-v8@4.1.7'
  - '@vitest/expect@4.1.7'
  - '@vitest/mocker@4.1.7'
  - '@vitest/pretty-format@4.1.7'
  - '@vitest/runner@4.1.7'
  - '@vitest/snapshot@4.1.7'
  - '@vitest/spy@4.1.7'
  - '@vitest/utils@4.1.7'
  - vitest@4.1.7
