name: CI

on: [push, pull_request]

permissions: write-all

jobs:
    build:
        name: 🔨 Build
        needs: [lint, typecheck]
        timeout-minutes: 15
        runs-on: ubuntu-latest
        steps:
            - name: 🕶️ Checkout repository
              uses: actions/checkout@v6

            - name: 📦 Install
              uses: ./.github/common/install

            - name: 🔨 Build Packages
              run: pnpm run build:packages

    test:
        name: 🧪 Test
        timeout-minutes: 15
        needs: [lint, typecheck]
        runs-on: ubuntu-latest
        steps:
            - name: 🕶️ Checkout repository
              uses: actions/checkout@v6

            - name: 📦 Install
              uses: ./.github/common/install

            - name: 🔨 Build Packages
              run: pnpm run build:packages

            - name: 🧪 Test
              run: pnpm run test

            - name: 🦺 Report Coverage to GitHub
              uses: davelosert/vitest-coverage-report-action@v2.11.2

            - name: 🦺 Codecov Coverage Reports
              uses: codecov/codecov-action@v6
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    lint:
        name: 📋 Lint
        timeout-minutes: 15
        runs-on: ubuntu-latest
        steps:
            - name: 🕶️ Checkout repository
              uses: actions/checkout@v6

            - name: 📦 Install
              uses: ./.github/common/install

            - name: 🔨 Build Packages
              run: pnpm run build:packages

            - name: 📋 Lint
              run: pnpm run lint

    typecheck:
        name: ✅ Typecheck
        timeout-minutes: 15
        runs-on: ubuntu-latest
        steps:
            - name: 🕶️ Checkout repository
              uses: actions/checkout@v6

            - name: 📦 Install
              uses: ./.github/common/install

            - name: 🔨 Build Packages
              run: pnpm run build:packages

            - name: ✅ Typecheck
              run: pnpm run typecheck


    build-docs:
        name: 🔨 Build Docs
        needs: [test]
        timeout-minutes: 15
        runs-on: ubuntu-latest
        steps:
            - name: 🕶️ Checkout repository
              uses: actions/checkout@v6

            - name: 📦 Install
              uses: ./.github/common/install

            - name: 🔨 Build Docs
              run: pnpm run build:docs

            - name: 📄 Configure GitHub Pages
              uses: actions/configure-pages@v6

            - name: 📤 Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: ./docs/out

    deploy-docs:
        name: 📚 Deploy Docs
        needs: [build-docs]
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        timeout-minutes: 15
        runs-on: ubuntu-latest
        permissions:
            pages: write
            id-token: write
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: 🚀 Deploy docs to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5